spring:
  application:
    name: user-service

  config:
    import: optional:file:.env[.properties]

  datasource:
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  liquibase:
    enabled: true
    drop-first: true
    change-log: classpath:db/changelog/changelog.yaml

  jpa:
    hibernate.ddl-auto: none